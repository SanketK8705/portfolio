name: LeetCode Stats Sync

on:
  schedule:
    - cron: '0 3 * * *' # Runs daily at 3:00 AM UTC
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write # Allows pushing the commit back to the repo

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch LeetCode stats
        run: |
          curl -fsSL "https://leetcode-api-pied.vercel.app/user/sanket_kumar_singh" -o /tmp/user.json
          curl -fsSL "https://leetcode-api-pied.vercel.app/user/sanket_kumar_singh/calendar" -o /tmp/calendar.json
          jq -s '.[0] * .[1]' /tmp/user.json /tmp/calendar.json > /tmp/leetcode-stats.json
          jq empty /tmp/leetcode-stats.json
          mkdir -p assets
          mv /tmp/leetcode-stats.json assets/leetcode-stats.json

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/leetcode-stats.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update LeetCode statistics" && git push)