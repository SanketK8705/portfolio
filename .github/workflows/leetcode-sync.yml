name: Sync LeetCode Stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch LeetCode stats
        run: |
          curl -fsSL "https://leetcode-stats-api.herokuapp.com/SanketK8705" -o /tmp/leetcode-stats.json
          jq empty /tmp/leetcode-stats.json
          mkdir -p assets
          mv /tmp/leetcode-stats.json assets/leetcode-stats.json

      - name: Commit updated stats
        run: |
          if git diff --quiet -- assets/leetcode-stats.json; then
            echo "LeetCode stats unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/leetcode-stats.json
          git commit -m "Sync LeetCode stats"
          git push
