name: LeetCode Stats Sync

on:
  schedule:
    - cron: '0 3 * * *' # Runs daily at 3:00 AM UTC
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write # Allows pushing the commit back to the repo

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch LeetCode Stats
        run: |
          mkdir -p src/data
          curl -s "https://leetcode-stats-api.herokuapp.com/sanket_kumar_singh" > src/data/leetcode-stats.json

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/leetcode-stats.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update LeetCode statistics" && git push)
